<!DOCTYPE html>
<html>
<head>
  <title>Trade Matrix</title>
</head>
<body>

<h2>Assets</h2>
<div id="assets"></div>

<h2>Balance: ₹<span id="balance">0</span></h2>

<h3>Your Holdings</h3>
<div id="holdings"></div>

</body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const client = window.supabase.createClient(
  "https://qajjrccoqyjulrjphdwm.supabase.co",
  "sb_publishable_FwKur31N-CLqlJkEH3ocWg_jdxqnhAy"
);

const USER_ID = "696b7fd7-aa03-4194-b731-bee754ae065b";

let userHoldings = {};
let isTrading = false;

// -------------------- LOAD ASSETS --------------------
async function loadAssets() {
  const { data } = await client.from("assets").select("*");
  render(data);
}

// -------------------- RENDER --------------------
function render(data) {
  const div = document.getElementById("assets");
  div.innerHTML = "";

  data.forEach(a => {
    const holding = userHoldings[a.id] || 0;

    div.innerHTML += `
      <div style="margin-bottom: 10px;">
        <b>${a.name}</b> - ₹${a.price}
        <button onclick="buy('${a.id}')">Buy</button>
        <button onclick="sell('${a.id}')" ${holding <= 0 ? "disabled" : ""}>
          Sell
        </button>
      </div>
    `;
  });
}

// -------------------- TRADE --------------------
async function buy(asset_id) {
  await trade(asset_id, "BUY");
}

async function sell(asset_id) {
  await trade(asset_id, "SELL");
}

async function trade(asset_id, type) {
  if (isTrading) return;

  isTrading = true;

  const res = await fetch(
    "https://qajjrccoqyjulrjphdwm.functions.supabase.co/trade",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhampyY2NvcXlqdWxyanBoZHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDkwMzksImV4cCI6MjA5MTg4NTAzOX0.7xCxXBfxit2tkLCRdFqFX6LPwyR1k5kh26cJQdxpeBA"
      },
      body: JSON.stringify({
        user_id: USER_ID,
        asset_id,
        type,
        quantity: 1
      })
    }
  );

  const data = await res.json();
  alert(JSON.stringify(data));

  await loadUserData();

  isTrading = false;
}

// -------------------- USER DATA --------------------
async function loadUserData() {
  const { data: user } = await client
    .from("users")
    .select("*")
    .eq("id", USER_ID)
    .single();

  document.getElementById("balance").innerText = user.balance;

  const { data: holdings } = await client
    .from("holdings")
    .select("asset_id, quantity")
    .eq("user_id", USER_ID);

  userHoldings = {};

  holdings.forEach(h => {
    userHoldings[h.asset_id] = h.quantity;
  });

  const div = document.getElementById("holdings");
  div.innerHTML = "";

  holdings.forEach(h => {
    div.innerHTML += `<p>${h.asset_id}: ${h.quantity}</p>`;
  });
}

// -------------------- REALTIME --------------------
client
  .channel('assets-channel')
  .on(
    'postgres_changes',
    { event: '*', schema: 'public', table: 'assets' },
    async () => {
      // ALWAYS refresh user + assets together
      await loadUserData();

      const { data } = await client.from("assets").select("*");
      render(data);
    }
  )
  .subscribe();
client
  .channel('holdings-channel')
  .on(
    'postgres_changes',
    { event: '*', schema: 'public', table: 'holdings' },
    async () => {
      await loadUserData();
    }
  )
  .subscribe();

client
  .channel('users-channel')
  .on(
    'postgres_changes',
    { event: '*', schema: 'public', table: 'users' },
    async () => {
      await loadUserData();
    }
  )
  .subscribe();
// -------------------- INIT --------------------
async function init() {
  await loadUserData();
  await loadAssets();
}

init();

</script>
</html>
